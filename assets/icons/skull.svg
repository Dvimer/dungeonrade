    <path d="M32 6
             C 14 6, 8 20, 8 32
             C 8 40, 12 46, 16 50
             L 16 58 L 24 58 L 24 52
             L 40 52 L 40 58 L 48 58 L 48 50
             C 52 46, 56 40, 56 32
             C 56 20, 50 6, 32 6 Z"
