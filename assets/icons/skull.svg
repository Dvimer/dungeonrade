    <ellipse cx="42" cy="30" rx="6" ry="7" fill="#1a1a1a" stroke="none" />
    <!-- nose -->
    <polygon points="32,38 28,44 32,46 36,44" fill="#1a1a1a" stroke="none" />
    <!-- teeth -->
    <rect x="22" y="50" width="20" height="3" fill="#1a1a1a" stroke="none" />
    <rect x="26" y="50" width="2" height="6" fill="#ffffff" stroke="none" />
    <rect x="30" y="50" width="2" height="6" fill="#ffffff" stroke="none" />
    <rect x="34" y="50" width="2" height="6" fill="#ffffff" stroke="none" />
    <rect x="38" y="50" width="2" height="6" fill="#ffffff" stroke="none" />
  </g>
</svg>
